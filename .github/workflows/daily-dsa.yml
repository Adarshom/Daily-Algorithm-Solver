name: Daily DSA (Gemini)

on:
  schedule:
    # Runs daily at 02:23 UTC (avoid top-of-hour load spikes)
    - cron: "23 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-dsa
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (default branch)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Generate solution (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: |
          python scripts/generate_daily_solution.py

      - name: Create branch + commit + push
        run: |
          DAY=$(python -c "from datetime import datetime, timezone; d=datetime.now(timezone.utc).timetuple().tm_yday; print(((d-1)%365)+1)")
          BRANCH="Day ${DAY}"

          git switch -c "$BRANCH"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add solutions/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add solution for Day ${DAY}"
          git push --set-upstream origin "$BRANCH"