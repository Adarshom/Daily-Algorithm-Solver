name: Daily DSA (Gemini)

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-dsa
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      GEMINI_MODEL: gemini-2.5-flash
      START_DATE: "2026-03-06"   # change this to the date you want to count as Day 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Ensure solutions directory exists
        run: mkdir -p solutions

      - name: Generate daily solution using Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_daily_solution.py

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add solutions/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add daily DSA solution"
          git push origin main
